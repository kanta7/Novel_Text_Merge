<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novel Text Merge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #444;
    }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafafa;
      appearance: none;
      cursor: pointer;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #4338ca; }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
      margin-top: 12px;
    }

    .btn-secondary:hover:not(:disabled) { background: #d1d5db; }

    .btn-success {
      background: #059669;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) { background: #047857; }

    /* Progress section */
    .progress-section { display: none; }
    .progress-section.active { display: block; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
    }

    .progress-count {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .progress-bar-bg {
      background: #e5e7eb;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-filename {
      font-size: 0.8rem;
      color: #9ca3af;
      text-align: center;
      min-height: 1.2em;
      word-break: break-all;
    }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .badge-parallel {
      background: #ede9fe;
      color: #6d28d9;
    }

    .badge-skip {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-merge {
      background: #dbeafe;
      color: #1e40af;
    }

    /* Advanced settings (details/summary) */
    .advanced-details {
      margin-bottom: 20px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
    }

    .advanced-summary {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4b5563;
      cursor: pointer;
      user-select: none;
      list-style: none;
      background: #f9fafb;
    }

    .advanced-summary::-webkit-details-marker { display: none; }
    .advanced-summary::marker { display: none; }

    .advanced-summary:hover { background: #f3f4f6; }

    .advanced-summary .summary-arrow {
      font-size: 0.7rem;
      transition: transform 0.2s;
      color: #9ca3af;
    }

    .advanced-details[open] .summary-arrow {
      transform: rotate(90deg);
    }

    .advanced-body {
      padding: 16px 16px 4px;
      border-top: 1.5px solid #e5e7eb;
      background: #fff;
    }

    /* Radio group */
    .radio-group-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .radio-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      margin: 0;
      margin-top: 2px;
      width: auto;
      cursor: pointer;
      accent-color: #4f46e5;
      flex-shrink: 0;
    }

    .radio-item-text {
      font-size: 0.9rem;
      color: #374151;
      line-height: 1.4;
    }

    .radio-item-text small {
      display: block;
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 1px;
    }

    /* Complete section */
    .complete-section { display: none; }
    .complete-section.active { display: block; }

    .complete-icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .complete-message {
      text-align: center;
      font-size: 1rem;
      color: #374151;
      margin-bottom: 24px;
    }

    /* Error */
    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #dc2626;
      display: none;
    }

    .error-box.active { display: block; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1.5px solid #e5e7eb;
      margin: 28px 0;
    }

    /* ── Error toggle button & detail box (complete section) ── */
    .btn-error-toggle {
      background: #fef2f2;
      color: #dc2626;
      border: 1.5px solid #fca5a5;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    .btn-error-toggle:hover:not(:disabled) { background: #fee2e2; }

    .error-detail-box {
      background: #fef9f9;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 8px;
      text-align: left;
      max-height: 220px;
      overflow-y: auto;
    }
    .error-detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .error-detail-list li {
      font-size: 0.78rem;
      color: #7f1d1d;
      word-break: break-all;
      padding: 3px 0;
      border-bottom: 1px solid #fecaca;
    }
    .error-detail-list li:last-child { border-bottom: none; }

    /* ── History section ── */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .history-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #374151;
    }
    .btn-text {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .btn-text:hover { background: #f3f4f6; color: #374151; }
    .history-list {
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-empty {
      font-size: 0.85rem;
      color: #9ca3af;
      text-align: center;
      padding: 16px 0;
    }
    .history-entry {
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .history-entry.has-errors { border-color: #fca5a5; }
    .history-entry > summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .history-entry > summary::-webkit-details-marker { display: none; }
    .history-entry > summary::marker { display: none; }
    .history-entry > summary:hover { background: #f9fafb; }
    .he-icon { font-size: 1rem; flex-shrink: 0; }
    .he-info { flex: 1; min-width: 0; }
    .he-folder {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .he-meta {
      display: block;
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 2px;
    }
    .he-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .badge-ok  { background: #d1fae5; color: #065f46; }
    .badge-err { background: #fee2e2; color: #dc2626; }
    .he-detail {
      padding: 8px 12px 10px;
      border-top: 1px solid #e5e7eb;
      background: #fff8f8;
    }
    .he-error-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .he-error-list li { font-size: 0.78rem; color: #dc2626; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Novel Text Merge</h1>
    <p class="subtitle">小説画像(webp)からテキストを抽出して統合します</p>

    <!-- State 1: Folder selection -->
    <div id="section-select">
      <label for="folder-select">処理するフォルダを選択</label>
      <select id="folder-select">
        <option value="">読み込み中...</option>
      </select>
      <label for="provider-select">使用する AI プロバイダ</label>
      <select id="provider-select">
        <option value="anthropic" selected>Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT-4o)</option>
        <option value="google">Google (Gemini)</option>
      </select>
      <label for="language-select">抽出言語</label>
      <select id="language-select">
        <option value="ja" selected>日本語</option>
        <option value="en">English</option>
      </select>
      <details class="advanced-details">
        <summary class="advanced-summary">
          <span class="summary-arrow">▶</span>詳細設定
        </summary>
        <div class="advanced-body">
          <span class="radio-group-label">文中改行の処理</span>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="join-lines" value="yes" checked>
              <span class="radio-item-text">
                文中の改行を結合する（推奨）
                <small>一文の区切りでない改行を取り除き、文をひとつながりに整形します</small>
              </span>
            </label>
            <label class="radio-item">
              <input type="radio" name="join-lines" value="no">
              <span class="radio-item-text">
                改行をそのまま保持する
                <small>画像上の行区切りをそのままテキストに反映します</small>
              </span>
            </label>
          </div>
          <span class="radio-group-label">結合オプション</span>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="merge-option" value="both" checked>
              <span class="radio-item-text">
                文章化 + 結合（推奨）
                <small>全ページを1つのテキストファイルに統合します</small>
              </span>
            </label>
            <label class="radio-item">
              <input type="radio" name="merge-option" value="extract-only">
              <span class="radio-item-text">
                文章化のみ（結合しない）
                <small>個別 txt ファイルのみ保存し、統合ファイルは作成しません</small>
              </span>
            </label>
          </div>
        </div>
      </details>
      <button class="btn btn-primary" id="btn-start" disabled>処理を開始</button>
      <div class="error-box" id="error-select"></div>
    </div>

    <hr class="divider" id="divider" style="display:none;">

    <!-- State 2: Processing -->
    <div class="progress-section" id="section-progress">
      <div class="progress-header">
        <span class="progress-label" id="progress-folder-name"></span>
        <span class="progress-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <p class="progress-filename" id="progress-filename">処理中...</p>
      <div class="progress-meta" id="progress-meta">
        <span class="badge badge-parallel" id="badge-parallel">⚡ 並列処理中（最大10件）</span>
        <span class="badge badge-skip" id="badge-skip" style="display:none;"></span>
        <span class="badge badge-merge" id="badge-merge" style="display:none;">🔗 結合中</span>
      </div>
    </div>

    <!-- State 3: Complete -->
    <div class="complete-section" id="section-complete">
      <div class="complete-icon">✅</div>
      <p class="complete-message" id="complete-message">テキスト抽出が完了しました！</p>
      <button class="btn btn-success" id="btn-download">テキストファイルをダウンロード</button>
      <!-- Error toggle: only shown when errors exist -->
      <button class="btn btn-error-toggle" id="btn-error-toggle" style="display:none;">
        ⚠️ エラー詳細を見る（<span id="error-toggle-count">0</span>件）
      </button>
      <div class="error-detail-box" id="error-detail-box" style="display:none;">
        <ul class="error-detail-list" id="error-detail-list"></ul>
      </div>
      <button class="btn btn-secondary" id="btn-reset">別のフォルダを処理</button>
    </div>

    <div class="error-box" id="error-process"></div>

    <hr class="divider" id="divider-history">
    <!-- History section -->
    <div id="section-history">
      <div class="history-header">
        <span class="history-title">📋 変換履歴</span>
        <button class="btn-text" id="btn-clear-history">クリア</button>
      </div>
      <div class="history-list" id="history-list">
        <p class="history-empty" id="history-empty">履歴はありません</p>
      </div>
    </div>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
