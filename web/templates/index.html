<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novel Text Merge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #444;
    }

    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafafa;
      appearance: none;
      cursor: pointer;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }

    select:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #4338ca; }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
      margin-top: 12px;
    }

    .btn-secondary:hover:not(:disabled) { background: #d1d5db; }

    .btn-success {
      background: #059669;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) { background: #047857; }

    /* Progress section */
    .progress-section { display: none; }
    .progress-section.active { display: block; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
    }

    .progress-count {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .progress-bar-bg {
      background: #e5e7eb;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-filename {
      font-size: 0.8rem;
      color: #9ca3af;
      text-align: center;
      min-height: 1.2em;
      word-break: break-all;
    }

    /* Complete section */
    .complete-section { display: none; }
    .complete-section.active { display: block; }

    .complete-icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .complete-message {
      text-align: center;
      font-size: 1rem;
      color: #374151;
      margin-bottom: 24px;
    }

    /* Error */
    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #dc2626;
      display: none;
    }

    .error-box.active { display: block; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1.5px solid #e5e7eb;
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Novel Text Merge</h1>
    <p class="subtitle">小説画像(webp)からテキストを抽出して統合します</p>

    <!-- State 1: Folder selection -->
    <div id="section-select">
      <label for="folder-select">処理するフォルダを選択</label>
      <select id="folder-select">
        <option value="">読み込み中...</option>
      </select>
      <button class="btn btn-primary" id="btn-start" disabled>処理を開始</button>
      <div class="error-box" id="error-select"></div>
    </div>

    <hr class="divider" id="divider" style="display:none;">

    <!-- State 2: Processing -->
    <div class="progress-section" id="section-progress">
      <div class="progress-header">
        <span class="progress-label" id="progress-folder-name"></span>
        <span class="progress-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <p class="progress-filename" id="progress-filename">処理中...</p>
    </div>

    <!-- State 3: Complete -->
    <div class="complete-section" id="section-complete">
      <div class="complete-icon">✅</div>
      <p class="complete-message" id="complete-message">テキスト抽出が完了しました！</p>
      <button class="btn btn-success" id="btn-download">テキストファイルをダウンロード</button>
      <button class="btn btn-secondary" id="btn-reset">別のフォルダを処理</button>
    </div>

    <div class="error-box" id="error-process"></div>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
